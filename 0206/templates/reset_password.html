<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <img src="{{ url_for('static', filename='forgot-password-icon.png') }}" alt="Logo" class="logo">
        <h2>重設密碼</h2>
        {% if message %}
            <p style="color: red;">{{ message }}</p>
        {% endif %}
        <form method="POST">
            <div class="input-group">
                <span class="icon">&#x1F4E7;</span> <!-- Email 圖示 -->
                <input type="text" name="username" placeholder="輸入你的帳號" required>
            </div>
            <button type="submit" class="login-btn">重設密碼</button>
        </form>
        <div class="links">
            <a href="{{ url_for('login') }}">返回登入</a>
        </div>
    </div>
    <!-- 左下角首頁按鈕 -->
    <div class="bottom-left-icon">
        <div class="home-icon" onclick="navigateToHome()">
            <i class="fas fa-home"></i>
        </div>
    </div>
    <script>
        function navigateToHome() {
            window.location.href = "/";
        }
    </script>
</body>
</html>
