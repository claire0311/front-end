<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <img src="{{ url_for('static', filename='icon.png') }}" alt="Logo" class="logo">
        <h2>會員登入</h2>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        <form method="POST" id="login-form" action="{{ url_for('login') }}">
            <div class="input-group">
                <span class="icon">&#x1F464;</span> <!-- 帳號圖標 -->
                <input type="text" id="username" name="username" placeholder="帳號" required>
            </div>
            <div class="input-group">
                <span class="icon">&#x1F512;</span> <!-- 密碼圖標 -->
                <input type="password" id="password" name="password" placeholder="密碼" required>
            </div>
            <button type="submit" class="login-btn">登入</button>
        </form>        
        <div class="links">
            <a href="{{ url_for('register') }}">註冊新帳號 | </a>
            <a href="{{ url_for('reset_password') }}">忘記密碼？</a>
        </div>
    </div>
    <!-- 左下角首頁按鈕 -->
    <div class="bottom-left-icon">
        <div class="home-icon" onclick="navigateToHome()">
            <i class="fas fa-home"></i>
        </div>
    </div>
    <script>
        function navigateToHome() {
            window.location.href = "/";
        }
    </script>
</body>


</html>
